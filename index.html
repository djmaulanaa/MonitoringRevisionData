<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operator Revision Status</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-3 sm:p-4 md:p-6">

  <!-- HEADER -->
  <div class="mb-4 md:mb-6">
    <h1 class="text-lg sm:text-xl md:text-2xl font-bold">
      📋 Status Revisi Operator
    </h1>
  </div>

  <!-- INPUT SN -->
  <div class="mb-4 flex flex-col sm:flex-row gap-2">
    <input id="inputSN" 
      placeholder="Masukkan SN..." 
      class="border p-3 text-sm sm:text-base rounded w-full sm:w-60 focus:ring-2 focus:ring-blue-400">

    <button onclick="searchData()" 
      class="bg-blue-500 text-white p-3 text-sm sm:text-base rounded w-full sm:w-auto">
      Search
    </button>
  </div>

  <!-- 🔥 MOBILE VIEW (CARD) -->
  <div id="cardContainer" class="grid gap-3 md:hidden"></div>

  <!-- 💻 DESKTOP TABLE -->
  <div class="hidden md:block overflow-x-auto bg-white rounded-xl shadow">
    <table class="min-w-full text-sm">
      <thead class="bg-gray-200">
        <tr>
          <th class="p-2">Date</th>
          <th class="p-2">Shift</th>
          <th class="p-2">SN</th>
          <th class="p-2">Name</th>
          <th class="p-2">Unit</th>
          <th class="p-2">RevisionType</th>
          <th class="p-2">Ritase</th>
          <th class="p-2">Distance</th>
          <th class="p-2">SMU Start</th>
          <th class="p-2">SMU End</th>
          <th class="p-2">Status</th>
          <th class="p-2">Feedback</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script type="module" src="operator.js"></script>
</body>
</html>
